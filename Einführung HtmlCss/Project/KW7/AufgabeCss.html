<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aufgabe</title>
    <style>
        
        html{
            background-color: white;
            }
        h1{
            color: blue;
            font-size: 60px;
            text-decoration: underline;
        }
        p{
            
            font-size: 30px;
            
        }
        h2{color: black;
           font-size: 40px;
           text-decoration: underline;
        }
        
        span{
            font-weight: bolder;
        } 
    </style>
    <body>
        <h1>Eine Überschrift</h1>
        <p>Ich bin ein Absatz der Überschrift</p>
        <h2>Ich bin eine weitere Überschrift</h2>
        <p>Und ich bin ein<span> weitere </span>Absatz</p>
    </body>
</head>
</html>
