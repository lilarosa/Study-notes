<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabelle</title>
</head>
<body>
     <table border="1">

        <tr>
            <th>Überschrift Spalte 1</th>
            <th>Überschrift Spalte 2</th>

        </tr>
        <tr>
            <td>Zeile 2 Spalte 1</td>
            <td>Zeile 2 Spalte 2</td>
        </tr>
        <tr>
            <td>Zeile 3 Spalte 1</td>
            <td>Zeile 3 Spalte 2</td>
        </tr>
        <tr>
            <td colspan="2">Colspan über zwei Zellen</td>
            
        </tr>

     </table>

     <hr>
     <table frame="hsides">    <!-- tabel border="1"-->

        <!-- frame="vsides" frame="box" frame="above" frame="below" frame="hsides"  frame="lhs" frame="rhs" frame="border" -->

        <tr>
            <th>Überschrift Spalte 1</th>
            <th>Überschrift Spalte 2</th>

        </tr>
        <tr>
            <td>Zeile 2 Spalte 1</td>
            <td rowspan="2">Zeile 2 Spalte 2</td>
        </tr>
        <tr>
            <td>Zeile 3 Spalte 1</td>
           
        </tr>
        <tr>
            <td colspan="2">Colspan über zwei Zellen</td>
            
        </tr>

     </table>

    
</body>
</html>
