    <title>Augabe_Gridlayout</title>
<style>

 .container{

    border: 1.5px purple solid;
    width: 750px;
    height: 550px;
    margin: auto;
    position: absolute;
 }

 .yellow{
      position: relative ;
      left: 0;
      top: 0;
      background-color: yellow;
      width: 750px;
      height: 110px;


 }

 .red{
      position: relative;
      left: 0;
      top: 0;
      background-color: red;
      width: 400px;
      height: 110px;
      

 }

 .purple{
      position: relative;
      left: 0;
      top: 0;
      background-color: purple;
      width: 400px;
      height: 110px;
      

 }

</style>
</head>
<body>
    <div class="container">
        <div class="yellow"></div>
        <div class="red"></div>
        <div class="purple"></div>
        <div></div>
        <div></div>

</div>
        
</body>
