<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=div, initial-scale=1.0">
    <!-- <link rel="stylesheet" href="Grösseangaben.css"> -->
    <title>Augabe_Gridlayout</title>
<style>

    .container{

        display: grid;
        grid-template-columns: 1fr 2fr 1fr 1fr;
        grid-template-rows: repeat(5, 1fr);


    }

    .gelb{
        height: 100px;
        background-color: yellow; 
        grid-column: 1/5;	   
        }

    .rot{
        background-color: red;
        grid-column: 1/3;
    }
    .lila{
        background-color: purple;
        grid-column: 3;
        grid-row: 2/4;
    }

    .gruen{
        background-color: green;
        grid-column: 4;
        grid-row: 2/6;
    }

    .orange{
        background-color: orange;
        grid-column: 2;
        grid-row: 3/4;
    }
    .grau{
        background-color: gray;
        grid-column: 1/4;
        grid-row: 5/6;
    }
</style>
</head>
<body>
    <div class="container">
        <div class="gelb"></div>
        <div class="rot"></div>
        <div class="lila"></div>
        <div class="gruen"></div>
        <div class="orange"></div>
        <div class="grau"></div>
    </div>   
    
    <section>
        <div>
             
        </div>
    </section>
</body>
</html>
