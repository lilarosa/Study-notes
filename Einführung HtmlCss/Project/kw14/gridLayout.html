<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=div, initial-scale=1.0">
    <!-- <link rel="stylesheet" href="Grösseangaben.css"> -->
    <title>Augabe_Gridlayout</title>
 <style>
        .m{ 

            width: 900px;
            height:750px ;
            border: 2px purple solid;
            margin: auto;
            display: grid;

            grid-template-columns: 1fr 2fr 1fr 1fr;
            /* gap: 1rem; */


        }
        
        .c{ background-color: ;
            padding:1rem;
            text-align: center
        }
        .s1{
            grid-column: 1/5;
            background-color: yellow;
            

        }
        .s2{

            grid-column: 1/3;
            grid-row: 2/3;
            background-color: red;
        }
        .s4{

            grid-row: 2/4;
            background-color: purple;
            grid-column: 3/4;
        }

        .s5{

            grid-column: 4/5;
            grid-row: 2/6;
            background-color: darkgreen;
        }
        .s3{
            grid-column: 2/3;
            grid-row: 3/4;
            background-color: orange;
        }

        .s6{
            grid-column: 1/4;
            grid-row: 5/6;
            background-color: gray;
        }
 </style>   
    
</head>
<body>

    <main class="m">
        <section class="c s1"></section>
        <section class="c s2"></section>
        <section class="c s3"></section>
        <section class="c s4"></section>
        <section class="c s5"></section>
        <section class="c s6"></section>

    </main>

</body>
</html>
