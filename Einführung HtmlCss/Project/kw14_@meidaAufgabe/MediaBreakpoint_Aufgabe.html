<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> @media Merkmal </title>
    <style>
        
        .container {

            display: grid;
            grid-template-columns: 1fr 1fr;
            /* hier will limit the setting for belows, should give new grid template colums for  */



            /* give a height for all grid-items */
            grid-template-rows: repeat(6,50px) ; 
            
            /* grid-template-rows: repeat(6, 1fr); */
            /* repeat(6, 1fr) = 6 rows with equal height */
            
            grid-template-areas:
                "a1 a2"
                "a3 a4"
                "a5 a6";
            gap: 0.2rem;

        }

        .E1 {

            background-color: lightslategray;
            grid-area: a1;
            /* height: 50px; */
        }

        .E2 {
            background-color: lightskyblue;
            grid-area: a2;
            /* height: 50px; */
        }

        .E3 {
            background-color: lightgreen;
            grid-area: a3;
            /* height: 50px; */
        }

        .E4 {
            background-color: lightcoral;
            grid-area: a4;
            /* height: 50px; */
        }

        .E5 {
            background-color: lightpink;
            grid-area: a5;
            /* height: 50px; */
        }

        .E6 {
            background-color: lightseagreen;
            grid-area: a6;
            /* height: 50px; */
        }


        @media screen and (max-width:400px) {

            .container {
                grid-template-columns: 1fr;
                grid-template-areas:
                    "a1"
                    "a2"
                    "a3"
                    "a4"
                    "a5"
                    "a6";
            }
            /* .E4{
                height: 50px;
            } */
        }

        @media screen and (min-width:400px) and (max-width:659px) {

            .container {
                display: grid;
                grid-template-columns: 1fr 1fr;
                grid-template-areas:
                    "a1 a2"
                    "a3 a4"
                    "a5 a6";
            }
        }

        @media screen and (min-width:660px) {

            .container {
                display: grid;
                grid-template-columns: 1fr 1fr 1fr;
                grid-template-areas:
                    "a1 a1 a1"
                    "a2 a3 a4"
                    "a5 a5 a4"
                    "a6 a6 a4";
            }
            /* .Elem1 {
                grid-column: 1 / 3; */
            }
        
          .box:nth-child(1) {
            background-color: lightblue;
            grid-column:1/4;

          }
          .box:nth-child(2) {
            background-color: lightskyblue;
            grid-column:1/2;
          }
          .box:nth-child(3) {
            background-color: lightgreen;
            grid-column:2/3;
            grid-row: 2/3;
          }
          .box:nth-child(4) {
            background-color: lightsalmon;
            grid-column:3/4;
            grid-row: 2/5;
          }
          .box:nth-child(5) {
            background-color: rgb(230, 48, 160);
            grid-column:1/3;
            grid-row: 3/4;
          }
          .box:nth-child(6) {
            background-color: rgb(128, 240, 221);
            grid-column:1/3;
            grid-row: 4/5;
          }


    </style>
</head>

<body>

    <div class="container">
        <div class="E1">Elem 1</div>
        <div class="E2">Elem 2</div>
        <div class="E3">Elem 3</div>
        <div class="E4">Elem 4</div>
        <div class="E5">Elem 5</div>
        <div class="E6">Elem 6</div>
    </div>


</body>

  <div class="container">
        <div class="box">Elem 1</div>
        <div class="box">Elem 2</div>
        <div class="box">Elem 3</div>
        <div class="box">Elem 4</div>
        <div class="box">Elem 5</div>
        <div class="box">Elem 6</div>
    </div>

</html>
