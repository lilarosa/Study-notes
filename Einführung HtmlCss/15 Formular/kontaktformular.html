<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>kontaktformular</title>
    <link rel="stylesheet" href="kontaktformular.css">
</head>
<body>
    <h1>kontaktformular</h1>
    <form action="#" method="post">
    <div> 
        <label for="besuchername">Ihre Name:</label>
        <input type="text" name="besuchername" id="besuchername" required>
       </div>
       <div> 
        <label for="besucheremail">Ihre Email:</label>
        <input type="Email" name="besucheremail" id="besucheremail" required>
       </div>
       <div>

           <label for="nachricht">Ihre Nachricht:</label>
           <textarea name="nachricht" id="nachricht" cols="30" rows="5" required></textarea>
       </div>

       <div>
         <label for="DSGVO">DSGVO-Einverständnis</label>
         <small><label for=""><input type="checkbox" id="DSGVO">Mit der Nutzung dieses Formulars erklären Sie sich mit der Speicherung
            und Verarbeitung Ihrer Daten durch diese Webseite einverstanden<a href="#">(Datenschutzerklärung)</a></label></small>
       </div>

         <button type="submit" value="">Abschicken</button> 
         
         
         <!-- <input type="submit" value="Abschicken">  -->

       </div>
     








    </form>

</body>
