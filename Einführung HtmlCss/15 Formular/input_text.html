<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Text Formular</title>

</head>
<body>
    <h2>einzeiliges Eingabefeld</h2>

    <form action="#">
        <!-- 'Beschriftung Variante 1 -->

        <label>Name:<input type="text" id="name" name="name"  ></label>
    
  <br><br>

    <!-- Beschriftung Variante2 -->

    <label for="name2">Name:</label>
    <input type="text" id="name2" name="name2" required size="30" maxlength="40" placeholder="Ihr Name" autofocus>

    <br><br>

    <label for="Nachricht">Nachricht:</label>
    <textarea name="Nachricht" id="Nachricht" cols="30" rows="10" placeholder="Ihre Nachricht"></textarea>
</form>

</body>
</html>
