<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=div, initial-scale=1.0">
    <title>Tabelle Gstaltung</title>

    <style>

        /* Gestaltung Tabelle */
        .tabelle1 {
            width: 100%;
            border: 2px solid black;
            border-collapse: collapse;
        }
        .tabelle1 th,.tabelle1 td {
            text-align: center;
            padding: 10px;
            border-bottom: 1px solid black;
        }
        .tabelle1 tr:hover {
            background-color: burlywood;
        }

        /* Gestaltung Tabelle2 */
        .tabelle2 thead {
            background-color: lightblue;
        }
        .tabelle2 tbody {
            background-color: lightgrey;
        }
        .tabelle2 th,.tabelle2 td {
            text-align: center;
            padding: 0.5rem 1rem;
            
        }
        .tabelle2{
            border-spacing: 5px;
            background-color: gray;
            border-collapse: collapse;
        }

        .tabelle2 th:hover {
            background-color: greenyellow;
         }

        .tabelle2 td:hover {
            background-color: burlywood;
        }



        
    </style>
</head>
<body>

    <table class="tabelle1">
        <tr>
            <th>Überschrift Spalte 1</th>
            <th>Überschrift Spalte 2</th>
        </tr>
        <tr>
            <td>Zeile2, Spalte1</td>
            <td>Zeile2, Spalte2</td>
        </tr>
        <tr>
            <td>Zeile3, Spalte1</td>
            <td>Zeile3, Spalte2</td>
        </tr>
        <tr>
            <td colspan="2">Colspan über zwei Zellen</td>
        </tr>
    </table><br><br><br><br><br><br>
 
    <hr>
    <br><br><br><br><br><br>

 
    <table class="tabelle2">
        <thead>
            <tr>
                <th>Überschrift Spalte 1</th>
                <th>Überschrift Spalte 2</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Zeile2, Spalte1</td>
                <td>Zeile2, Spalte2</td>
            </tr>
            <tr>
                <td>Zeile3, Spalte1</td>
                <td>Zeile3, Spalte2</td>
            </tr>
        </tbody>
        <tfoot>
            <tr>
                <td colspan="2">Colspan über zwei Zellen</td>
            </tr>
        </tfoot>
    </table>
