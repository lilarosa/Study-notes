<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> girdArea </title>
 <style>

.a{
    background-color: rgb(200, 161, 231);
    grid-area: areaA;
}
.b{
    background-color: pink;
    grid-area: areaB;
}
.c{
    background-color: greenyellow;
    grid-area: areaC;

}

.container{
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    grid-template-rows: 1fr 1fr 1fr;
    /* grid-template-areas: 
        "areaA areaA areaA"
        "areaB areaC areaC"
        "areaB areaC areaC";
    ; */

    /* grid-template-areas: 
        "areaB areaB areaA"
        "areaB areaB areaC"
        "areaB areaB areaC" */

        grid-template-areas: 
        "areaA areaA ."
        "areaA areaA ."
        ". areaB areaC"
}

/* . is für lehre felder, braucht keine class */
    
</style>

</head>



 <body>
      <div class="container">
         <div class="a">One (a)</div>
         <div class="b">Two (b)</div>
         <div class="c">Three (c)</div>     

      </div>

 </body>
