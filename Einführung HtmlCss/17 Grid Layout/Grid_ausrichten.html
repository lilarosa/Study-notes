<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> gird_ausrichten </title>
 <style>

/* container soll größer als das Grid sein, um justify-content testen zu können */

.container{

    max-width: 600px;
    height: 500px;
    border-bottom: 5px solid red;
    border-right: 5px solid red;
    
    display: grid;
    /* spalten und Zeilen nicht gleichmßig verteilen,sondern Griedfelder kleiner machen, damit Leeraus entsteht */
    grid-template-columns: 20% 20% 20% ;
    grid-template-rows: 20% 20% 20% ;

    /* mit align-items werden die Grid Items im Verhältnis zum Grid Container ausgerichted */
    /* align-items: end; */
    /* end:vertical nach unter, start:vertical nach oben */
    /* justify-items: center;  */
    /*  horizontal ausrichten für alle Gerid-items ,start, end, center */
    /* place-items: center end; */
  /* the combination for align-items and justify-items */
    

    /* Inhalt in einem Gridfeld kleiner machen, als das Feld um align/justify-items */


    /* justify/align-content zur Ausrichtung des Grid-containers selbst

    justify-content: center;
    align-content: end;
    place-content: end center;*/

    /* justify/align-content zur Verteilung des Leerraums */

    justify-content: space-between;
    justify-content: space-evenly;
    justify-content: space-around;
    align-content: space-between;
    align-content: space-evenly;
    align-content: space-around;
    place-content: space-between space-evenly;

}

    .a1{
        background-color: red;
        height: 20px;
        width: 60px;

        /*  dienen dazu gezielt Grid-itms ausrichten */
        justify-self: center;
        align-self: end;
    }

    .a2 {
            background-color: rgb(243, 121, 121);
            height: 40px;
            width: 60px;
        }
 
        .a3 {
            background-color: rgb(242, 28, 28);
            height: 60px;
            width: 60px;
        }
 
        .a4{
            background-color:  rgb(155, 174, 239);
            height: 20px;
            width: 60px;
        }
 
        .a5{
            background-color:  rgb(102, 133, 236);
            height: 30px;
            width: 40px;
        }
 
        .a6{
            background-color:  rgb(25, 75, 237);
            height: 60px;
            width: 60px;
        }
 
        .a7{
            background-color:  rgb(192, 239, 174);
            height: 20px;
            width: 60px;
        }
 
        .a8{
            background-color:  rgb(142, 236, 104);
            height: 30px;
            width: 40px;
        }
 
        .a9{
            background-color:  rgb(71, 202, 19);
            height: 60px;
            width: 60px;
        }


</style>


</head>


<body>
      <div class="container">

        <div class="a1">1</div>
        <div class="a2">2</div>
        <div class="a3">3</div>
        <div class="a4">4</div>
        <div class="a5">5</div>
        <div class="a6">6</div>
        <div class="a7">7</div>
        <div class="a8">8</div>
        <div class="a9">9</div>

        
      </div>
</body>  
</html>
