<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Einkaufsliste</title>
    <link rel="stylesheet" href="einkaufsliste.css">
</head>
<body>

    <h1>Einkaufsliste</h1>
    <p>Füge Artikel zu deiner Einkaufsliste hinzu:</p>
    
    <div>
       <input type="text" id="inputItem" placeholder="Artikel hinzufügen">
      <button id="addItem">Add</button>

    </div>

     <ul id="itemList">

        <!-- Hier werden die Artikel aufgelistet -->
     </ul>

     <button id="clearList">Liste leeren</button>
    

    <script src="einkaufsliste.js" defer></script> 
     
 </body>
</html>
