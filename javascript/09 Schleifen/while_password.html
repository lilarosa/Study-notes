<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Meine Seite</h1>
    <button id="but">Zum geheimen Bereich</button>
    
</body>
<script>

  let btn=document.getElementById("but");
  btn.addEventListener("click", passwortEingabe);
  function passwortEingabe(){
    let eingabe=prompt("Bitte Passwort eingeben");
    let passwortRichtig="12345";
    let passwortVersuch=1;
    while(eingabe !== passwortRichtig && passwortVersuch<3){
        alert("Passwort falsch");
        eingabe=prompt("Bitte Passwort eingeben");
        passwortVersuch++;
    }
    if(eingabe==passwortRichtig){
        alert("you are in");
        document.body.innerHTML += "<h2>Willkommen im geheimen Bereich</h2>";
    }
    else{
        alert("You have maximum attempts");
        document.body.innerHTML += "<h2> You have maximum attempts</h2>";
    }
    
    
  }
</script>
</html>
