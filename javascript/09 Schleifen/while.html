

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h1>Meine Seite</h1>
    <button id="but">Zum geheimen Bereich</button>
   
</body>

<script>
    document.getElementById("but").onclick = passwortEingabe;
    let anzahlVersuche = 0;

    function passwortEingabe(){
        let eingabe= prompt("Passwort bitte eingeben");
        while(eingabe != "geheim" && anzahlVersuche < 3){  //!= bedeutet ungleich
            anzahlVersuche++;
            if(anzahlVersuche >= 3){
                break;
                 
            }
            eingabe = prompt("Passwort falsch. Bitte erneut eingeben:");  
        }

        if(anzahlVersuche >= 3){
            alert("3 mal falsch, du bist gesperrt");
            document.getElementById("but").disabled = true; // Button deaktivieren
            document.body.innerHTML += "<h2> Konto gesperrt</h2>";
            
        }
        else{ 
            alert("Zugang gewährt");
        }
    }

    //Der Benutzer hat nur 3 Versuche, nach 3 mal falsch eingeben => Fehlermeldung "Konto gesperrt"

</script>

</html>
</script>    
</html>
