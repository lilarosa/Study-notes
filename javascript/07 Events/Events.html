<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Events</title>
</head>
<body>
    <h1>Events</h1>

    <p>Das Klicken erzeugt eine Naricht</p>
    <button  type="button" id="btn" onclick="alert('Aufruf durch onclick')">Klick mich</button>

    <p>Drücken des Buttons zeigt das Datum an</p>
    <button type="button" onclick="zeigeDatum">Datum!!!</button>
    <p id="datum"></p>

    <script>
        function zeigeDatum() {
            
        document.getElementById("datum").innerText = Date();
        } 

    </Script>

    <!-- Events komplett in JavaScript behandelt-->
     <p> Mein Text wird beim Drücken geändert</p>
     <button id="but" type="button">Text ändern</button>

     <script>

        const button = document.getElementById("but");
        button.onclick= textAndern;
        // button.addEventListener("click", textAndern); Möglichkeit2 // EventListener

        function textAndern(){
            document.getElementById("but").innerText = "Geändert";

        }
     </script>

     <h2 id="headline">Bespiel für Mousemove Event</h2>
     <script>
        const headline= document.getElementById("headline");
        headline.onmousemove= farbeAndern;
        headline.onmouseleave= farbezurucksetzen;

        function farbeAndern(){
            headline.style.color= "red";
        }

       
       function farbezurucksetzen(){
            headline.style.color= "black";
        }
     </script>

</body>
</html>
