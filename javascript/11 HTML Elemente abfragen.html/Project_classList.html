<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classlist</title>
    <style>
        .newMenu{
            display: none;
            background-color: lightgray;
            padding: 10px;
            border: 1px solid #ccc;
            width: 200px;
        }
        .menu{
            display: block;
            background-color: lightblue;
            padding: 10px;
            border: 1px solid #ccc;
            width: 200px;
        }
    </style>
</head>
<body>
    <h1>Interaktive Menü Demo</h1>
    <button id="toggleMenü">Menü anzeigen</button>
    <div id="menu" class="newMenu" >
        <div class="menü-item">Start</div>
        <div class="menü-item">Über uns</div>   
        <div class="menü-item">Kontakt</div>

    </div>
    <script>
        const btnToggle = document.getElementById("toggleMenü");
        
        btnToggle.onclick= function (){
            const nav= document.getElementById("menu");
            nav.classList.toggle("newMenu");
            console.log("Menu umgeschaltet");

        }
    </script>
    
</body>
</html>
