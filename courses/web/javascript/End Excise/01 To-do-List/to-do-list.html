<!-- Features You Will Build:
Add a Task – User can type a task and click "Add"

Mark as Done – Checkbox or strike-through style

Delete a Task – Remove task from the list

(Optional): Save to localStorage so it stays after refreshing -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-do-List</title>
    <style>
        .task-item {
            justify-content: space-between;
            list-style-type: square;
        }

        .done {
            text-decoration: line-through;
            color: gray;
        }
    </style>
</head>
<body>
    <h1>To-do-List</h1>
    <input type="text" id="taskInput" placeholder="Add a new task">
    <button id="addTaskButton">Add Task</button>
    <ul id="taskList" class="task-item">
        <!-- Tasks will be added here -->
    </ul>
    <button id="clearTaskButton">Clear Tasks</button>

  <script>
    const taskInput= document.getElementById("taskInput") 
    const btnAddTask = document.getElementById("addTaskButton");
    const taskList= document.getElementById("taskList");
    const btnCleartask = document.getElementById("clearTaskButton");
 
    btnAddTask.addEventListener("click", function(){
     let taskText= taskInput.value;
     let listTask = document.createElement("li");
     listTask.innerText = taskText;
     taskList.appendChild(listTask);
     listTask.classList.add("task-item");
    taskInput.value = ""; // Clear input field after adding task
    listTask.style.cursor = "pointer";
    listTask.addEventListener("click", function(){
        listTask.classList.toggle("done");
    btnCleartask.addEventListener("click", function(){
        taskList.innerHTML = ""; // Clear all tasks
    });

    } 
    );
    listTask.addEventListener("dblclick", function(){
        taskList.removeChild(listTask); // Remove task on double click

    } 
      
    );


    }  );




</script>   
</body>
</html>
