<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Window_Ausgaben</title>
</head>
<body>
    <!-- .alert ok button -->
    <h1>Warnhinweis/Info</h1>
    <button onclick="window.alert(`Hallo, ich bin eine Warnug!`)">Warnung!</button>

    <!-- .confirm ok mit abbrechen button -->
    <h1>Nachricht</h1>
    <button onclick="window.confirm(`Hallo, ich bin eine Warnug!`)">Warnung!</button>

    <h1>Nachricht mit Eingabefeld</h1>
    <button onclick="window.prompt(`Bitte Alter eingeben!`)">Info mit Eingabe!</button>

</body>
</html>
